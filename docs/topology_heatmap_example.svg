<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Topology heatmap visualization example</title>
  <desc id="desc">Example showing a topology point network and a flattened heatmap-style projection of the same topology field.</desc>
  <defs>
    <style>
      text { font-family: Menlo, Consolas, monospace; letter-spacing: 0; }
      .bg { fill: #080909; }
      .panel { fill: #111313; stroke: #303636; stroke-width: 1; }
      .label { fill: #d8ddd8; font-size: 13px; }
      .small { fill: #c6cdc8; font-size: 11px; }
      .muted { fill: #8e9893; font-size: 10px; }
      .line { stroke: #a8afaa; stroke-width: 1.5; fill: none; }
      .soft { stroke: #5a625f; stroke-width: 1; fill: none; }
      .node { fill: #d8ddd8; stroke: #080909; stroke-width: 2; }
      .node-core { fill: #eef4ef; stroke: #080909; stroke-width: 2; }
      .h0 { fill: #08143e; }
      .h1 { fill: #0d2a78; }
      .h2 { fill: #0066b0; }
      .h3 { fill: #008de0; }
      .h4 { fill: #26c5d9; }
      .h5 { fill: #ffe448; }
      .h6 { fill: #ff8a18; }
      .h7 { fill: #ff4f0a; }
      .h8 { fill: #df0000; }
    </style>
    <g id="fineHeatBlock">
