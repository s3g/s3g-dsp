      <line x1="194" y1="146" x2="66" y2="160"/>
      <line x1="140" y1="178" x2="18" y2="102"/>
    </g>
    <g stroke="#a8afaa" stroke-width="1.8">
      <line x1="92" y1="96" x2="116" y2="96"/>
      <line x1="104" y1="84" x2="104" y2="108"/>
    </g>
    <rect class="node" x="20" y="40" width="16" height="16"/>
    <rect class="node" x="82" y="14" width="16" height="16"/>
    <rect class="node" x="144" y="26" width="16" height="16"/>
    <rect class="node" x="202" y="74" width="16" height="16"/>
    <rect class="node" x="186" y="138" width="16" height="16"/>
    <rect class="node" x="132" y="170" width="16" height="16"/>
    <rect class="node" x="58" y="152" width="16" height="16"/>
    <rect class="node" x="10" y="94" width="16" height="16"/>
  </g>
  <text class="muted" x="48" y="260">Editable point/network representation.</text>

  <rect x="360" y="159" width="54" height="2" fill="#a8afaa"/>
  <polygon points="412,153 422,160 412,167" fill="#c6cdc8"/>

  <rect class="panel" x="444" y="34" width="448" height="250"/>
  <text class="label" x="464" y="64">HEATMAP VIEW</text>
  <text class="small" x="464" y="90">Flattened projection of the same field.</text>
