      <rect fill="#0d2a78" x="0" y="12" width="12" height="12"/><rect fill="#0066b0" x="12" y="12" width="12" height="12"/><rect fill="#008de0" x="24" y="12" width="12" height="12"/><rect fill="#ffe448" x="36" y="12" width="12" height="12"/><rect fill="#ff4f0a" x="48" y="12" width="12" height="12"/><rect fill="#df0000" x="60" y="12" width="12" height="12"/><rect fill="#ff4f0a" x="72" y="12" width="12" height="12"/><rect fill="#ff8a18" x="84" y="12" width="12" height="12"/><rect fill="#26c5d9" x="96" y="12" width="12" height="12"/><rect fill="#0066b0" x="108" y="12" width="12" height="12"/><rect fill="#0d2a78" x="120" y="12" width="12" height="12"/><rect fill="#0066b0" x="132" y="12" width="12" height="12"/><rect fill="#26c5d9" x="144" y="12" width="12" height="12"/><rect fill="#ff8a18" x="156" y="12" width="12" height="12"/><rect fill="#26c5d9" x="168" y="12" width="12" height="12"/><rect fill="#0066b0" x="180" y="12" width="12" height="12"/>
