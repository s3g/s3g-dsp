  <rect class="bg" width="920" height="360"/>

  <rect class="panel" x="28" y="34" width="306" height="250"/>
  <text class="label" x="48" y="64">TOPOLOGY VIEW</text>
  <text class="small" x="48" y="90">Active lanes become points.</text>
  <text class="small" x="48" y="106">Neighbor links describe relationships.</text>
  <g transform="translate(86 112) scale(0.68)">
    <g stroke="#e5ebe6" stroke-width="2.5">
