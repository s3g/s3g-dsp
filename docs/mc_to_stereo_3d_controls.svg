<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 430" role="img" aria-labelledby="title desc">
  <title id="title">3D layout controls for MC to Stereo</title>
  <desc id="desc">Diagram showing 3D layout points, width, distance, attenuation, and stereo output mapping.</desc>
  <rect width="1020" height="430" fill="#0d0f0f"/>
  <style>
    text{font-family:Menlo,Monaco,'Courier New',monospace;letter-spacing:0;fill:#c6cdc8}.h{fill:#d8ddd8;font-weight:700;font-size:13px}.s{fill:#8e9893;font-size:11px}.b{fill:#111313;stroke:#303636;stroke-width:1}.l{stroke:#8e9893;stroke-width:1.3;fill:none}.p{fill:#d8ddd8;stroke:#080909;stroke-width:2}.q{fill:#222827;stroke:#4b5652;stroke-width:1}.rail{fill:#131615;stroke:#5f6864;stroke-width:1}.fill{fill:#9a9f9c}.dim{fill:#6f7774}
  </style>
  <g transform="translate(38 34)">
    <rect class="b" x="0" y="0" width="584" height="338"/>
    <text class="h" x="18" y="29">3D PROJECTION VIEW</text>
    <text class="s" x="210" y="29">sphere / hemisphere / cube layouts</text>
    <line class="l" x1="94" y1="166" x2="500" y2="166" opacity=".45"/>
    <line class="l" x1="297" y1="88" x2="297" y2="244" opacity=".34"/>
    <line class="l" x1="94" y1="92" x2="500" y2="92" opacity=".16"/>
    <line class="l" x1="94" y1="240" x2="500" y2="240" opacity=".16"/>
    <text class="s" x="48" y="96">HIGH</text><text class="s" x="58" y="170">MID</text><text class="s" x="57" y="244">LOW</text>
    <g stroke="#8e9893" stroke-width="1" opacity=".6">
      <line x1="152" y1="218" x2="260" y2="104"/><line x1="260" y1="104" x2="442" y2="112"/><line x1="442" y1="112" x2="386" y2="232"/><line x1="386" y1="232" x2="152" y2="218"/>
      <line x1="170" y1="132" x2="260" y2="104"/><line x1="170" y1="132" x2="152" y2="218"/><line x1="170" y1="132" x2="442" y2="112"/>
      <line x1="250" y1="270" x2="152" y2="218"/><line x1="250" y1="270" x2="386" y2="232"/>
    </g>
    <g>
      <rect class="p" x="145" y="211" width="14" height="14"/><rect class="p" x="253" y="97" width="14" height="14"/><rect class="p" x="435" y="105" width="14" height="14"/><rect class="p" x="379" y="225" width="14" height="14"/><rect class="p" x="163" y="125" width="14" height="14"/><rect class="p" x="243" y="263" width="14" height="14"/>
    </g>
    <g transform="translate(98 284)">
      <text class="s" x="0" y="0">WIDTH</text><rect class="rail" x="56" y="-10" width="138" height="8"/><rect class="fill" x="57" y="-9" width="92" height="6"/>
      <text class="s" x="230" y="0">DIST</text><rect class="rail" x="282" y="-10" width="138" height="8"/><rect class="fill" x="283" y="-9" width="118" height="6"/>
      <text class="s" x="0" y="28">ATT</text><rect class="rail" x="56" y="18" width="138" height="8"/><rect class="fill" x="57" y="19" width="62" height="6"/>
      <text class="s" x="230" y="28">ROT</text><rect class="rail" x="282" y="18" width="138" height="8"/><rect class="fill" x="283" y="19" width="72" height="6"/>
    </g>
  </g>
  <g transform="translate(650 34)">
    <rect class="b" x="0" y="0" width="332" height="338"/>
    <text class="h" x="18" y="29">WHAT THE CONTROLS DO</text>
    <g transform="translate(18 62)">
      <rect class="q" x="0" y="0" width="296" height="50"/><text class="h" x="14" y="22">WDTH</text><text class="s" x="78" y="22">stereo span of the fold-down</text><text class="s" x="78" y="39">0% collapses, 200% exaggerates</text>
      <rect class="q" x="0" y="62" width="296" height="58"/><text class="h" x="14" y="84">DST</text><text class="s" x="78" y="84">3D spread from center</text><text class="s" x="78" y="101">upper and lower points move away</text><text class="s" x="78" y="118">from the middle of the map</text>
      <rect class="q" x="0" y="132" width="296" height="58"/><text class="h" x="14" y="154">ATT</text><text class="s" x="78" y="154">gain attenuation from height</text><text class="s" x="78" y="171">and rear position in 3D layouts</text>
      <rect class="q" x="0" y="202" width="296" height="50"/><text class="h" x="14" y="224">WGT</text><text class="s" x="78" y="224">how strongly the layout model</text><text class="s" x="78" y="241">affects rear/shape folding</text>
    </g>
  </g>
  <text class="s" x="38" y="400">DIST changes placement. ATT changes level. They are separate so distance can be exaggerated without automatically turning speakers down.</text>
</svg>
