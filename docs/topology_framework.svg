<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="780" viewBox="0 0 1120 780" role="img" aria-labelledby="title desc">
  <title id="title">s3g-dsp topology framework</title>
  <desc id="desc">Diagram showing active channels becoming topology points, points forming a network, and the network mapping to per-lane DSP parameters.</desc>
  <defs>
    <style>
      text { font-family: Menlo, Consolas, monospace; letter-spacing: 0; }
      .bg { fill: #090909; }
      .panel { fill: #151515; stroke: #6a6a6a; stroke-width: 1; }
      .title { fill: #f0f0f0; font-size: 18px; }
      .label { fill: #d8d8d8; font-size: 13px; }
      .small { fill: #a8a8a8; font-size: 11px; }
      .muted { fill: #777; font-size: 10px; }
      .line { stroke: #bcbcbc; stroke-width: 2; fill: none; }
      .thin { stroke: #8c8c8c; stroke-width: 1; fill: none; }
      .accent { stroke: #f4f4f4; stroke-width: 2; fill: none; }
      .node { fill: #d6d6d6; stroke: #111; stroke-width: 1; }
      .node2 { fill: #8ad0ff; stroke: #111; stroke-width: 1; }
      .heat1 { fill: #0d2a78; }
      .heat2 { fill: #008de0; }
      .heat3 { fill: #ffe448; }
      .heat4 { fill: #ff4f0a; }
      .heat5 { fill: #df0000; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bcbcbc"/>
    </marker>
  </defs>

  <rect class="bg" width="1120" height="780"/>
  <text class="title" x="32" y="38">s3g-dsp topology layer</text>
  <text class="small" x="32" y="60">host-visible meta controls generate per-lane DSP relationships without exposing per-channel automation.</text>

  <rect class="panel" x="32" y="92" width="220" height="360"/>
  <text class="label" x="52" y="122">1. ACTIVE PINS</text>
  <text class="small" x="52" y="148">patch matrix rows define</text>
  <text class="small" x="52" y="166">the active lane set</text>
  <g transform="translate(62 196)">
    <rect class="thin" x="0" y="0" width="128" height="128"/>
    <g class="thin">
      <path d="M16 0v128 M32 0v128 M48 0v128 M64 0v128 M80 0v128 M96 0v128 M112 0v128"/>
      <path d="M0 16h128 M0 32h128 M0 48h128 M0 64h128 M0 80h128 M0 96h128 M0 112h128"/>
    </g>
    <rect class="node2" x="3" y="3" width="10" height="10"/>
    <rect class="node2" x="19" y="19" width="10" height="10"/>
    <rect class="node2" x="35" y="35" width="10" height="10"/>
    <rect class="node2" x="51" y="51" width="10" height="10"/>
    <rect class="node2" x="67" y="67" width="10" height="10"/>
    <rect class="node2" x="83" y="83" width="10" height="10"/>
    <rect class="node2" x="99" y="99" width="10" height="10"/>
    <rect class="node2" x="115" y="115" width="10" height="10"/>
  </g>
  <text class="muted" x="52" y="372">full / 2ch / 4ch / custom</text>
  <text class="muted" x="52" y="390">unused channels can pass through</text>

  <path class="line" marker-end="url(#arrow)" d="M260 272 H340"/>

  <rect class="panel" x="352" y="92" width="250" height="360"/>
  <text class="label" x="372" y="122">2. TOPOLOGY SPACE</text>
  <text class="small" x="372" y="148">shape + displacement + animation</text>
  <text class="small" x="372" y="166">position each active lane</text>
  <g transform="translate(424 206)">
    <path class="thin" d="M40 40 L150 18 L204 92 L168 190 L54 168 Z"/>
    <path class="thin" d="M40 40 L78 112 L54 168 M150 18 L118 116 L168 190 M204 92 L118 116 M78 112 L118 116"/>
    <circle class="node" cx="40" cy="40" r="7"/>
    <circle class="node" cx="150" cy="18" r="7"/>
    <circle class="node" cx="204" cy="92" r="7"/>
    <circle class="node" cx="168" cy="190" r="7"/>
    <circle class="node" cx="54" cy="168" r="7"/>
    <circle class="node2" cx="78" cy="112" r="7"/>
    <circle class="node2" cx="118" cy="116" r="7"/>
  </g>
  <text class="muted" x="372" y="388">SHAP AMT PULL X Y Z TWST FLAR SEED</text>
  <text class="muted" x="372" y="406">ANIM + VAR set readable motion scenes</text>

  <path class="line" marker-end="url(#arrow)" d="M610 272 H690"/>

  <rect class="panel" x="702" y="92" width="190" height="360"/>
  <text class="label" x="722" y="122">3. NETWORK</text>
  <text class="small" x="722" y="148">nearest neighbors and</text>
  <text class="small" x="722" y="166">centroid pull define</text>
  <text class="small" x="722" y="184">lane relationships</text>
  <g transform="translate(742 218)">
    <circle class="node2" cx="64" cy="68" r="8"/>
    <circle class="node" cx="14" cy="22" r="6"/>
    <circle class="node" cx="112" cy="18" r="6"/>
    <circle class="node" cx="128" cy="112" r="6"/>
    <circle class="node" cx="28" cy="124" r="6"/>
    <path class="accent" d="M64 68 L14 22 M64 68 L112 18 M64 68 L128 112 M64 68 L28 124"/>
    <path class="thin" d="M14 22 L112 18 L128 112 L28 124 Z"/>
    <path class="thin" d="M54 68 h20 M64 58 v20"/>
  </g>
  <text class="muted" x="722" y="388">NBR: 1-3 neighbors</text>
  <text class="muted" x="722" y="406">RAD: neighbor threshold</text>
  <text class="muted" x="722" y="424">CENT: centroid influence</text>

  <path class="line" marker-end="url(#arrow)" d="M900 272 H970"/>

  <rect class="panel" x="982" y="92" width="106" height="360"/>
  <text class="label" x="1002" y="122">4. DSP</text>
  <text class="small" x="1002" y="148">per-lane</text>
  <text class="small" x="1002" y="166">effect values</text>
  <g transform="translate(1004 208)">
    <rect class="heat1" x="0" y="0" width="18" height="18"/>
    <rect class="heat2" x="20" y="0" width="18" height="18"/>
    <rect class="heat3" x="40" y="0" width="18" height="18"/>
    <rect class="heat4" x="60" y="0" width="18" height="18"/>
    <rect class="heat2" x="0" y="20" width="18" height="18"/>
    <rect class="heat4" x="20" y="20" width="18" height="18"/>
    <rect class="heat5" x="40" y="20" width="18" height="18"/>
    <rect class="heat3" x="60" y="20" width="18" height="18"/>
  </g>
  <text class="muted" x="1002" y="302">delay</text>
  <text class="muted" x="1002" y="320">feedback</text>
  <text class="muted" x="1002" y="338">tone</text>
  <text class="muted" x="1002" y="356">pitch</text>
  <text class="muted" x="1002" y="374">smear</text>

  <rect class="panel" x="92" y="486" width="936" height="42"/>
  <text class="small" x="112" y="512">One host automation surface controls many internal lane values: topology is the repeatable meta-layer for future multichannel effects.</text>

  <text class="title" x="32" y="590">delay processor topology map</text>
  <text class="small" x="32" y="612">Each active lane becomes a point. The point's position is read as a control field for the delay engine.</text>

  <rect class="panel" x="32" y="636" width="250" height="104"/>
  <text class="label" x="52" y="664">POINT POSITION</text>
  <text class="small" x="52" y="690">X/Z: left-right and depth spread</text>
  <text class="small" x="52" y="708">Y: height / vertical weighting</text>
  <text class="small" x="52" y="726">R: distance from center</text>

  <path class="line" marker-end="url(#arrow)" d="M290 688 H330"/>

  <rect class="panel" x="342" y="636" width="350" height="104"/>
  <text class="label" x="362" y="664">DELAY FIELD</text>
  <text class="small" x="362" y="690">TIME: X + Z + Y + radius + SEED</text>
  <text class="small" x="362" y="708">FDBK: Y - Z + X + radius + SEED</text>
  <text class="small" x="362" y="726">TONE: -Y + X + radius + SEED</text>

  <path class="line" marker-end="url(#arrow)" d="M700 688 H740"/>

  <rect class="panel" x="752" y="636" width="336" height="104"/>
  <text class="label" x="772" y="664">EFFECT CHARACTER</text>
  <text class="small" x="772" y="690">PITCH: Y + radius + Z + shape bias</text>
  <text class="small" x="772" y="708">SMR: lane phase + radius + X/Z relation</text>
  <text class="small" x="772" y="726">DIFF: neighbor graph + centroid pull</text>

  <text class="muted" x="52" y="766">AMT scales how strongly topology offsets the base delay controls. ANIM/VAR move the point field over time; NBR/RAD/CENT shape cross-lane diffusion.</text>
</svg>
